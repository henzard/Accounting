name: Build Android Production

# EAS Workflows - simpler alternative to GitHub Actions
# This builds Android when version tags are pushed
# 
# Setup required:
# 1. Link GitHub repo: https://expo.dev/accounts/henzardkruger/projects/Accounting/settings/github
# 2. Install Expo GitHub App and connect repository
# 3. Workflow will trigger automatically on version tag pushes
#
# GitHub Actions workflow (.github/workflows/create-github-release.yml) will:
# - Wait for this build to complete
# - Download the APK
# - Create a GitHub release with the APK attached

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch: {}  # Allow manual triggering

jobs:
  build_android:
    name: Build Android APK
    type: build
    params:
      platform: android
      profile: production
      # EAS will automatically use the commit SHA from the tag for build metadata