name: EAS Build and GitHub Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create releases
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./src
        run: npm ci

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build Android APK
        working-directory: ./src
        id: android-build
        run: |
          # Start build without waiting (--no-wait)
          echo "🚀 Starting Android build..."
          BUILD_OUTPUT=$(eas build --platform android --profile production --non-interactive --no-wait --json 2>&1)
          
          # Try to extract build ID from JSON (could be array or single object)
          BUILD_ID=$(echo "$BUILD_OUTPUT" | jq -r 'if type == "array" then .[0].id else .id end' 2>/dev/null || echo "")
          
          # Fallback: extract from URL if JSON parsing fails (format: .../builds/3128e966-7624-435b-a9e7-e6df68a59c57)
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ] || [ "$BUILD_ID" = "" ]; then
            BUILD_ID=$(echo "$BUILD_OUTPUT" | grep -o 'builds/[a-f0-9-]\{36\}' | head -1 | sed 's|builds/||')
          fi
          
          if [ -z "$BUILD_ID" ]; then
            echo "❌ Failed to extract build ID from output:"
            echo "$BUILD_OUTPUT"
            exit 1
          fi
          
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "✅ Android build started with ID: $BUILD_ID"
          echo "📋 Build URL: https://expo.dev/accounts/henzardkruger/projects/Accounting/builds/$BUILD_ID"

      - name: Wait for Android build
        working-directory: ./src
        run: |
          BUILD_ID="${{ steps.android-build.outputs.build_id }}"
          echo "⏳ Waiting for build $BUILD_ID to complete..."
          echo "📋 Build URL: https://expo.dev/accounts/henzardkruger/projects/Accounting/builds/$BUILD_ID"
          MAX_ATTEMPTS=240  # 60 minutes max (240 * 15 seconds = 3600 seconds)
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            # Get build status - try multiple methods
            BUILD_LIST=$(eas build:list --platform android --limit 10 --json 2>/dev/null || echo "[]")
            BUILD_STATUS=$(echo "$BUILD_LIST" | jq -r ".[] | select(.id == \"$BUILD_ID\") | .status" 2>/dev/null || echo "")
            
            # If not found in list, try getting specific build
            if [ -z "$BUILD_STATUS" ] || [ "$BUILD_STATUS" = "null" ]; then
              BUILD_INFO=$(eas build:view "$BUILD_ID" --json 2>/dev/null || echo "{}")
              BUILD_STATUS=$(echo "$BUILD_INFO" | jq -r '.status' 2>/dev/null || echo "")
            fi
            
            if [ "$BUILD_STATUS" = "finished" ]; then
              echo "✅ Build completed successfully!"
              exit 0
            elif [ "$BUILD_STATUS" = "errored" ] || [ "$BUILD_STATUS" = "canceled" ]; then
              echo "❌ Build failed with status: $BUILD_STATUS"
              echo "📋 Check build details: https://expo.dev/accounts/henzardkruger/projects/Accounting/builds/$BUILD_ID"
              exit 1
            elif [ -n "$BUILD_STATUS" ] && [ "$BUILD_STATUS" != "null" ]; then
              # Build is in progress (in-progress, pending, etc.)
              if [ $((ATTEMPT % 8)) -eq 0 ]; then
                echo "   Status: $BUILD_STATUS (attempt $ATTEMPT/$MAX_ATTEMPTS)"
              fi
            else
              # Status unknown, but build might still be processing
              if [ $((ATTEMPT % 8)) -eq 0 ]; then
                echo "   Waiting for build to appear... (attempt $ATTEMPT/$MAX_ATTEMPTS)"
              fi
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
            sleep 15
          done
          
          echo "❌ Build timeout after 60 minutes"
          echo "📋 Check build status: https://expo.dev/accounts/henzardkruger/projects/Accounting/builds/$BUILD_ID"
          exit 1

      # iOS builds skipped for now
      # - name: Build iOS IPA
      #   working-directory: ./src
      #   id: ios-build
      #   run: |
      #     BUILD_OUTPUT=$(eas build --platform ios --profile production --non-interactive --wait --json 2>&1)
      #     BUILD_ID=$(echo "$BUILD_OUTPUT" | jq -r 'if type == "array" then .[0].id else .id end' 2>/dev/null || echo "")
      #     if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ] || [ "$BUILD_ID" = "" ]; then
      #       BUILD_ID=$(echo "$BUILD_OUTPUT" | grep -o 'builds/[a-f0-9-]\{36\}' | head -1 | sed 's|builds/||')
      #     fi
      #     if [ -z "$BUILD_ID" ]; then
      #       echo "❌ Failed to extract build ID from output:"
      #       echo "$BUILD_OUTPUT"
      #       exit 1
      #     fi
      #     echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
      #     echo "iOS build ID: $BUILD_ID"

      - name: Download Android build
        working-directory: ./src
        run: |
          eas build:download --id ${{ steps.android-build.outputs.build_id }} --platform android --output ./android-build.apk

      # iOS builds skipped for now
      # - name: Download iOS build
      #   working-directory: ./src
      #   run: |
      #     eas build:download --id ${{ steps.ios-build.outputs.build_id }} --platform ios --output ./ios-build.ipa

      - name: Extract version from tag
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(node -p "require('./src/package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.version }}
          body_path: docs/release-notes.md
          files: |
            src/android-build.apk
            # src/ios-build.ipa  # iOS builds skipped for now
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
